name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Security Audit ──
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high + critical)
        run: npm audit --audit-level=high || true

  # ── Build, Typecheck & Unit Tests ──
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build

      - name: Build Mobile PWA
        run: npm run build:mobile

      - name: Run unit tests
        run: npm run test:unit

      # Cache the build for E2E shards to reuse
      - name: Cache Next.js build
        uses: actions/cache/save@v4
        with:
          path: |
            .next
            public/mobile-app/dist
          key: nextjs-build-${{ github.sha }}

  # ── E2E Tests (Playwright) — sharded across 2 parallel jobs ──
  e2e:
    runs-on: ubuntu-latest
    needs: build-and-unit
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js + Mobile PWA build
        uses: actions/cache/restore@v4
        with:
          path: |
            .next
            public/mobile-app/dist
          key: nextjs-build-${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --shard=${{ matrix.shard }}/2

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
