name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Security Audit ──
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security audit (high + critical)
        run: npm audit --audit-level=high || true

  # ── Build, Typecheck & Unit Tests ──
  build-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build

      - name: Build Mobile PWA
        run: npm run build:mobile

      - name: Run unit tests
        run: npm run test:unit

      - name: Verify Next.js production build exists
        run: test -f .next/BUILD_ID

      - name: Upload app build for E2E shards
        uses: actions/upload-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: |
            .next
            public/mobile-app/dist
          include-hidden-files: true
          retention-days: 1

  # ── E2E Tests (Playwright) — sharded across 2 parallel jobs ──
  e2e:
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright:v1.58.0-noble
    needs: build-and-unit
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download app build
        uses: actions/download-artifact@v4
        with:
          name: app-build-${{ github.sha }}
          path: .

      - name: Verify downloaded build artifacts
        run: |
          test -f .next/BUILD_ID
          test -f public/mobile-app/dist/app.bundle.js

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --shard=${{ matrix.shard }}/2

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
