name: PR Check

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lightweight PR validation ──
  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Mobile PWA build
        run: node scripts/build-mobile.js

      - name: Unit tests
        run: npm run test:unit

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build-${{ github.event.pull_request.number }}
          path: .next/
          retention-days: 3

      - name: Comment PR with status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('<!-- pr-check-bot -->'));
            const body = `<!-- pr-check-bot -->
            ### ✅ PR Check Passed

            | Check | Status |
            |-------|--------|
            | TypeScript | ✅ Clean |
            | Unit Tests | ✅ 207/207 |
            | Mobile Build | ✅ Success |
            | Next.js Build | ✅ Success |

            Build artifact available for download (3-day retention).
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── E2E smoke test on PR ──
  pr-e2e:
    runs-on: ubuntu-latest
    needs: pr-validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}
          path: test-results/
          retention-days: 7
