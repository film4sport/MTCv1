name: PR Check

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Lightweight PR validation ──
  pr-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Mobile PWA build
        run: node scripts/build-mobile.js

      - name: Unit tests
        run: npm run test:unit

      - name: Build Next.js
        run: npm run build

      # Cache the build for E2E shards to reuse
      - name: Cache Next.js build
        uses: actions/cache/save@v4
        with:
          path: .next
          key: nextjs-build-pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Comment PR with status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('<!-- pr-check-bot -->'));
            const body = `<!-- pr-check-bot -->
            ### ✅ PR Check Passed

            | Check | Status |
            |-------|--------|
            | TypeScript | ✅ Clean |
            | Unit Tests | ✅ Passing |
            | Mobile Build | ✅ Success |
            | Next.js Build | ✅ Success |

            Build artifact cached for E2E shards.
            `;

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── E2E tests — sharded across 2 parallel jobs ──
  pr-e2e:
    runs-on: ubuntu-latest
    needs: pr-validate
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Next.js build
        uses: actions/cache/restore@v4
        with:
          path: .next
          key: nextjs-build-pr-${{ github.event.pull_request.number }}-${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --shard=${{ matrix.shard }}/2

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr-${{ github.event.pull_request.number }}-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7
