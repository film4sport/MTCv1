<div class="screen" id="screen-partners" aria-label="Find partners">
      <div class="screen-header">
        <button class="back-btn" onclick="navigateTo('home')" aria-label="Go back to home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h2 class="screen-title">FIND PARTNERS</h2>
        <button class="header-btn header-btn-right" onclick="showPostPartnerModal()" aria-label="Post partner request">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
      
      <div class="partner-filter-section" id="partnerFilterPills">
        <div class="partner-filter-row-wrap">
          <span class="partner-filter-label">Type</span>
          <div class="filter-pills">
            <div class="filter-pill active" onclick="filterPartners(this, 'all')">All</div>
            <div class="filter-pill" onclick="filterPartners(this, 'available')">Available</div>
            <div class="filter-pill" onclick="filterPartners(this, 'singles')">Singles</div>
            <div class="filter-pill" onclick="filterPartners(this, 'mixed')">Mixed</div>
            <div class="filter-pill" onclick="filterPartners(this, 'mens')">Men's</div>
            <div class="filter-pill" onclick="filterPartners(this, 'womens')">Women's</div>
          </div>
        </div>
        <div class="partner-filter-row-wrap">
          <span class="partner-filter-label">Level</span>
          <div class="filter-pills">
            <div class="filter-pill" onclick="filterPartners(this, 'beginner')">Beginner</div>
            <div class="filter-pill" onclick="filterPartners(this, 'intermediate')">Intermediate</div>
            <div class="filter-pill" onclick="filterPartners(this, 'advanced')">Advanced</div>
          </div>
        </div>
      </div>
      
      <div class="partner-cards-container" id="partnerCardsContainer">
        <!-- Partner cards populated by JavaScript from API data -->
      </div>

      <div class="empty-state partner-empty-state" id="noPartners" style="display: block;">
        <div class="partner-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <line x1="19" y1="8" x2="19" y2="14"></line>
            <line x1="22" y1="11" x2="16" y2="11"></line>
          </svg>
        </div>
        <div class="empty-state-title">LOOKING FOR A MATCH?</div>
        <div class="empty-state-text">No partner requests yet. Be the first to post one!</div>
        <button class="partner-empty-cta" onclick="showPostPartnerModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          POST REQUEST
        </button>
      </div>
      
      <!-- Post Partner Request Modal -->
      <!-- [[COMPONENT:modal-postpartner]] -->
    </div>
