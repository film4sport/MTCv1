<div class="screen" id="screen-search" aria-label="Search">
      <div class="screen-header">
        <button class="back-btn" onclick="navigateTo('home')" aria-label="Go back to home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h2 class="screen-title">SEARCH</h2>
      </div>
      
      <div class="search-container">
        <div class="search-input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" class="search-input" placeholder="Search members, courts, events..." id="globalSearchInput" aria-label="Search members, courts, events" oninput="debouncedHandleSearch(this.value)">
        </div>
        
        <div class="search-results" id="searchResults">
          <!-- Initial State -->
          <div class="search-category" id="searchSuggestions">
            <div class="section-header">
              <h3 class="section-title">QUICK ACCESS</h3>
            </div>
            <div class="search-result-item" onclick="navigateTo('book')">
              <div class="search-result-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </div>
              <div class="search-result-info">
                <h4>Book a Court</h4>
                <p>Reserve a court for your next match</p>
              </div>
            </div>
            <div class="search-result-item" onclick="navigateTo('partners')">
              <div class="search-result-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
              </div>
              <div class="search-result-info">
                <h4>Find a Partner</h4>
                <p>Connect with other members</p>
              </div>
            </div>
            <div class="search-result-item" onclick="navigateTo('events')">
              <div class="search-result-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
              </div>
              <div class="search-result-info">
                <h4>Club Events</h4>
                <p>Tournaments and clinics</p>
              </div>
            </div>
          </div>
          
          <!-- Search Results (populated dynamically) -->
          <div id="dynamicSearchResults"></div>
        </div>
      </div>
    </div>
