<div class="screen" id="screen-admin" aria-label="Admin Panel">
      <div class="screen-header">
        <button class="back-btn" onclick="navigateTo('home')" aria-label="Go back to home">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <h2 class="screen-title">ADMIN PANEL</h2>
        <button class="admin-refresh-btn" onclick="refreshAdminTab()" aria-label="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        </button>
      </div>

      <!-- Admin Tab Navigation -->
      <div class="admin-tabs-bar">
        <button class="admin-tab active" data-tab="dashboard" onclick="switchAdminTab('dashboard')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </button>
        <button class="admin-tab" data-tab="members" onclick="switchAdminTab('members')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Members
        </button>
        <button class="admin-tab" data-tab="courts" onclick="switchAdminTab('courts')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"></rect><line x1="12" y1="4" x2="12" y2="20"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg>
          Courts
        </button>
        <button class="admin-tab" data-tab="announcements" onclick="switchAdminTab('announcements')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"></path><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          Announce
        </button>
      </div>

      <!-- ===== TAB 1: DASHBOARD ===== -->
      <!-- [[COMPONENT:admin-dashboard]] -->

      <!-- ===== TAB 2: MEMBERS ===== -->
      <!-- [[COMPONENT:admin-members]] -->

      <!-- ===== TAB 3: COURTS ===== -->
      <div id="adminTabCourts" class="admin-tab-content">
        <div id="adminCourtsList" class="admin-courts-grid">
          <div class="admin-empty-state">Loading courts...</div>
        </div>

        <!-- Court Blocking Section -->
        <div class="admin-card" style="margin-top: 16px;">
          <div class="admin-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>Court Blocks</div>
          <button class="admin-btn admin-btn-primary" onclick="showBlockCourtModal()" style="margin-bottom: 12px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="15"></line><line x1="15" y1="9" x2="9" y2="15"></line></svg>
            Block Court Time
          </button>
          <div id="adminBlocksList">
            <div class="admin-empty-state">No upcoming blocks</div>
          </div>
        </div>
      </div>

      <!-- ===== TAB 4: ANNOUNCEMENTS ===== -->
      <div id="adminTabAnnouncements" class="admin-tab-content">
        <div class="admin-card">
          <div class="admin-card-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"></path><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>Send Announcement</div>
          <input type="text" id="adminAnnTitle" class="admin-input" placeholder="Title (optional)">
          <textarea id="adminAnnMessage" class="admin-textarea" placeholder="Write your announcement..." rows="3"></textarea>
          <div class="admin-ann-options">
            <select id="adminAnnType" class="admin-select">
              <option value="info">Info</option>
              <option value="warning">Warning</option>
              <option value="urgent">Urgent</option>
            </select>
            <select id="adminAnnAudience" class="admin-select">
              <option value="all">All Members</option>
              <option value="interclub_a">Team A</option>
              <option value="interclub_b">Team B</option>
              <option value="interclub_all">All Interclub</option>
            </select>
          </div>
          <button class="admin-btn admin-btn-primary" onclick="postAdminAnnouncement()" id="postAnnBtn">Post Announcement</button>
        </div>

        <div class="section-header admin-section-header">
          <h3 class="section-title">RECENT ANNOUNCEMENTS</h3>
        </div>
        <div id="adminAnnouncementHistory" class="settings-group">
          <div class="admin-empty-state">No announcements sent yet</div>
        </div>
      </div>
    </div>
