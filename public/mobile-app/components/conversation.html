<div class="screen" id="screen-conversation" aria-label="Conversation">
      <div class="screen-header conversation-header">
        <button class="back-btn" onclick="navigateTo('messages')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <div class="conversation-user-info">
          <div class="conversation-avatar" id="conversationAvatar"></div>
          <div class="conversation-name" id="conversationName">—</div>
        </div>
        <button class="header-btn convo-search-toggle" id="convoSearchToggle" aria-label="Search messages" onclick="toggleConvoSearch()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </button>
      </div>
      <div class="convo-search-bar" id="convoSearchBar" style="display:none;">
        <input type="text" id="convoSearchInput" placeholder="Search messages..." oninput="filterChatMessages(this.value)">
        <span class="convo-search-count" id="convoSearchCount"></span>
      </div>
      
      <div class="chat-messages" id="chatMessages">
        <!-- Messages will be populated dynamically -->
      </div>
      
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" aria-label="Type a message" placeholder="Type a message..." onkeypress="if(event.key==='Enter')sendMessage()">
        <button class="chat-send-btn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </div>
    </div>
