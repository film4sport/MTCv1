<div class="modal-overlay" id="modifyModal" onclick="closeModifyModal()" role="dialog" aria-modal="true" aria-label="Modify booking">
      <div class="action-modal" id="modifyModalContent" onclick="event.stopPropagation()">
        <div class="action-modal-handle"></div>
        <div class="action-modal-title">MODIFY BOOKING</div>
        <div class="action-modal-subtitle">Choose how you'd like to change this booking</div>
        
        <div class="action-modal-options">
          <button class="action-modal-btn neutral" onclick="changeBookingTime()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            Change Time
          </button>
          <button class="action-modal-btn neutral" onclick="changeBookingCourt()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            Change Court
          </button>
          <button class="action-modal-btn danger" onclick="showCancelFromModify()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
            Cancel Booking
          </button>
        </div>
      </div>
    </div>
