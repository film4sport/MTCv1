<div id="adminTabMembers" class="admin-tab-content">
        <div id="adminMemberSummary" class="admin-member-summary"></div>
        <div class="admin-search-bar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="adminMemberSearch" class="admin-search-input" placeholder="Search by name or email..." oninput="filterAdminMembers(this.value)">
        </div>
        <div class="admin-team-filters">
          <button class="admin-filter-btn active" data-team="all" onclick="filterMembersByTeam('all', this)">All</button>
          <button class="admin-filter-btn" data-team="a" onclick="filterMembersByTeam('a', this)">Team A</button>
          <button class="admin-filter-btn" data-team="b" onclick="filterMembersByTeam('b', this)">Team B</button>
        </div>
        <div id="adminMembersList" class="admin-members-list">
          <div class="admin-empty-state">Loading members...</div>
        </div>
        <button class="admin-fab" onclick="showAddMemberModal()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
