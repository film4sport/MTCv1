<div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-label="Booking confirmed">
      <canvas id="confettiCanvas"></canvas>
      <div class="modal">
        <div class="modal-icon modal-icon-success">
          <svg viewBox="0 0 56 56" width="56" height="56" fill="none"><circle cx="28" cy="28" r="28" fill="#1a1a1a"/><polyline points="18 28 25 35 38 22" fill="none" stroke="#c8ff00" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="modal-title" id="modalTitle">BOOKING CONFIRMED!</div>
        <div class="modal-desc" id="modalDesc">Court 1 is booked for Tuesday, Jan 28 at 11:00 AM. See you on the court!</div>
        <button class="modal-btn-secondary" id="modalAddCalBtn" onclick="addBookingToCalendar()" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Add to Calendar
        </button>
        <button class="modal-btn-primary-full" id="modalBookTogetherBtn" onclick="bookWithPartner()" style="display:none;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          BOOK A COURT TOGETHER
        </button>
        <button class="modal-btn ripple" onclick="closeModal()">LET'S GO!</button>
      </div>
    </div>
