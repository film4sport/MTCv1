<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTC Court - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(145deg, #1a1a1a 0%, #0f0f0f 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 320px;
    }
    
    .offline-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 24px;
      background: rgba(200, 255, 0, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    
    .offline-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      color: #c8ff00;
    }
    
    .offline-message {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .offline-btn {
      display: inline-block;
      padding: 16px 32px;
      background: #c8ff00;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    .offline-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(200, 255, 0, 0.3);
    }
    
    .offline-btn:active {
      transform: translateY(0);
    }
    
    .offline-tips {
      margin-top: 40px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      text-align: left;
    }
    
    .offline-tips-title {
      font-size: 13px;
      font-weight: 700;
      color: #c8ff00;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .offline-tips-list {
      list-style: none;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      line-height: 1.8;
    }
    
    .offline-tips-list li::before {
      content: 'âœ“ ';
      color: #c8ff00;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">ðŸŽ¾</div>
    <h1 class="offline-title">YOU'RE OFFLINE</h1>
    <p class="offline-message">
      No worries! Check your connection and try again. 
      Your bookings will sync when you're back online.
    </p>
    <button class="offline-btn" onclick="location.reload()">
      Try Again
    </button>
    
    <div class="offline-tips">
      <div class="offline-tips-title">While Offline</div>
      <ul class="offline-tips-list">
        <li>View cached bookings</li>
        <li>Check club info</li>
        <li>Draft messages</li>
        <li>Auto-sync when online</li>
      </ul>
    </div>
  </div>
  
  <script>
    // Check if back online and reload
    window.addEventListener('online', () => {
      location.reload();
    });
  </script>
</body>
</html>
